version: "3.8"
services:
  hashtopolis-web-ui-dev:
    container_name: hashtopolis-web-ui-dev
    build:
      context: ..
      target: hashtopolis-web-ui-dev
      args:
        - CONTAINER_USER_CMD_PRE
        - CONTAINER_USER_CMD_POST
    environment:
      - HASHTOPOLIS_BACKEND_URL
      # Custom themes are opt-in. Set this to the folder to scan inside the
      # container and mount your .css folder to that same path (volume below).
      # - HASHTOPOLIS_CUSTOM_THEMES_DIR=/custom-themes
    ports:
      - "4200:4200"
    volumes:
      # This is where VS Code should expect to find your project's source code
      # and the value of "workspaceFolder" in .devcontainer/devcontainer.json
      - ..:/app
      # No custom theme is loaded by default. To enable themes, set
      # HASHTOPOLIS_CUSTOM_THEMES_DIR (above) to the container path the entrypoint
      # should scan, and uncomment the mount below to provide the .css files at
      # that path. The bundled examples live in ../custom-themes.
      # - ../custom-themes:/custom-themes:ro
    networks:
      - hashtopolis_dev

networks:
  hashtopolis_dev:
    # This network will also be used by the python-agent
    name: hashtopolis_dev
