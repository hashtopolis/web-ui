version: "3.8"
services:
  hashtopolis-web-ui-dev:
    container_name: hashtopolis-web-ui-dev
    build:
      context: ..
      target: hashtopolis-web-ui-dev
      args:
        - CONTAINER_USER_CMD_PRE
        - CONTAINER_USER_CMD_POST
    environment:
      - HASHTOPOLIS_BACKEND_URL
    ports:
      - "4200:4200"
    volumes:
      # This is where VS Code should expect to find your project's source code
      # and the value of "workspaceFolder" in .devcontainer/devcontainer.json
      - ..:/app
      # No custom theme is loaded by default. To enable the bundled example
      # themes (or your own), uncomment the mount below — the entrypoint scans
      # /custom-themes on startup and registers every .css file it finds.
      # Point HASHTOPOLIS_CUSTOM_THEMES_DIR at any host folder to override the
      # source (defaults to ../custom-themes).
      # - ${HASHTOPOLIS_CUSTOM_THEMES_DIR:-../custom-themes}:/custom-themes:ro
    networks:
      - hashtopolis_dev

networks:
  hashtopolis_dev:
    # This network will also be used by the python-agent
    name: hashtopolis_dev
