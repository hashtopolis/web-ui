@switch (fileType) {
  @case (FileType.WORDLIST) {
    <app-page
      title="Wordlist Files"
      actionTitle="New Wordlist"
      actionLink="/files/wordlist/new-wordlist"
      [showAction]="showCreateButton"
    >
      <app-table>
        <app-files-table #table [name]="name" [fileType]="fileType"></app-files-table>
      </app-table>
    </app-page>
  }
  @case (FileType.RULES) {
    <app-page
      title="Rule Files"
      actionTitle="New Rule"
      actionLink="/files/rules/new-rule"
      [showAction]="showCreateButton"
    >
      <app-table>
        <app-files-table #table [name]="name" [fileType]="fileType"></app-files-table>
      </app-table>
    </app-page>
  }
  @case (FileType.OTHER) {
    <app-page
      title="Other Files"
      actionTitle="New File"
      actionLink="/files/other/new-other"
      [showAction]="showCreateButton"
    >
      <app-table>
        <app-files-table #table [name]="name" [fileType]="fileType"></app-files-table>
      </app-table>
    </app-page>
  }
}
