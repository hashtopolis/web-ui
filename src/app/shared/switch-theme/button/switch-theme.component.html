@if (currentTheme() === 'dark') {
<button type="button" class="dropdown-item items-center" (click)="selectTheme('light')">
  <fa-icon class="dropdown-icon" [icon]="faSun" aria-hidden="true"></fa-icon>
  Light Mode
</button>
<button type="button" class="dropdown-item items-center" (click)="selectTheme('fallout')">
  <fa-icon class="dropdown-icon" [icon]="faRadiation" aria-hidden="true"></fa-icon>
  Rainbow-Fallout Mode
</button>
}
@if (currentTheme() === 'light') {
<button type="button" class="dropdown-item items-center credits" (click)="selectTheme('dark')">
  <fa-icon class="dropdown-icon" [icon]="faMoon" aria-hidden="true"></fa-icon>
  Dark Mode
</button>
<button type="button" class="dropdown-item items-center" (click)="selectTheme('fallout')">
  <fa-icon class="dropdown-icon" [icon]="faRadiation" aria-hidden="true"></fa-icon>
  Rainbow-Fallout Mode
</button>
}
@if (currentTheme() === 'fallout') {
<button type="button" class="dropdown-item items-center" (click)="selectTheme('light')">
  <fa-icon class="dropdown-icon" [icon]="faSun" aria-hidden="true"></fa-icon>
  Light Mode
</button>
<button type="button" class="dropdown-item items-center credits" (click)="selectTheme('dark')">
  <fa-icon class="dropdown-icon" [icon]="faMoon" aria-hidden="true"></fa-icon>
  Dark Mode
</button>
}
