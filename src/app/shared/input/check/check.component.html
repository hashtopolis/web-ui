<div class="checkbox-wrapper" [class.is-invalid]="hasError && isTouched">
  <mat-checkbox
    [checked]="value"
    (change)="onValueChange($event)"
    (blur)="onTouched()"
    [disabled]="disabled"
    [id]="inputId"
    [class.mat-mdc-checkbox-invalid]="hasError && isTouched"
  >
    {{ title }}
    @if (tooltip) {
      <mat-icon
        matTooltip="{{ tooltip }}"
        matTooltipPosition="below"
        matTooltipClass="tooltip-custom-style"
        container="body"
        aria-hidden="true"
      >
        info
      </mat-icon>
    }
  </mat-checkbox>

  @if (hasError && errors) {
    <div class="error-message text-xs mt-1 text-destructive">
      @if (errors['required']) {
        <span>{{ title }} is required</span>
      }
    </div>
  }
</div>
