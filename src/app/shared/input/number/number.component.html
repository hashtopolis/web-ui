<div class="field-stack" [class.is-invalid]="hasError && isTouched && !readonly" [class.input--readonly]="readonly">
  <label class="field-stack__label" [attr.for]="inputId">
    @if (linkTo) {
      <a [routerLink]="linkTo">{{ title }}</a>
    } @else {
      <span class="field-stack__label-text" [matTooltip]="title" matTooltipPosition="above" appOverflowTooltip>
        {{ title }}
      </span>
    }
    @if (isRequired && !readonly) {
      <span class="field-stack__required" aria-hidden="true">*</span>
    }
    @if (tooltip) {
      <mat-icon
        matTooltip="{{ tooltip }}"
        matTooltipPosition="below"
        matTooltipClass="tooltip-custom-style"
        aria-hidden="true"
      >
        info
      </mat-icon>
    }
  </label>

  <mat-form-field
    class="field-stack__field"
    [class.mat-form-field-invalid]="hasError && !readonly"
    [class.mat-form-field-touched]="isTouched && !readonly"
  >
    <div [class.is-invalid]="error && !readonly">
      <input
        #inputField
        matInput
        type="number"
        [min]="min"
        [max]="max"
        [id]="inputId"
        [value]="value"
        (input)="onValueChange($event)"
        (blur)="onTouched()"
        [required]="isRequired"
        [class.is-invalid]="error && !readonly"
        [class.ng-invalid]="hasError && !readonly"
        [class.ng-touched]="isTouched && !readonly"
        [disabled]="disabled"
        [readonly]="readonly"
      />
    </div>
    @if (hasError && errors && !readonly) {
      <mat-hint class="mat-mdc-form-field-error text-destructive">
        @if (errors['required']) {
          <span>{{ title }} is required</span>
        }
        @if (errors['min']) {
          <span>Value cannot be less than {{ min }}</span>
        }
        @if (errors['max']) {
          <span>Value cannot be greater than {{ max }}</span>
        }
        @if (errors['pattern']) {
          <span>Please enter a valid number</span>
        }
      </mat-hint>
    }
  </mat-form-field>
</div>
