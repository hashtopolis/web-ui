<div class="field-stack" [class.is-invalid]="hasError && isTouched">
  <label class="field-stack__label" [attr.for]="inputId">
    @if (!isLoading) {
      {{ title }}
      @if (isRequired) {
        <span class="field-stack__required" aria-hidden="true">*</span>
      }
      @if (tooltip) {
        <mat-icon
          matTooltip="{{ tooltip }}"
          matTooltipPosition="below"
          matTooltipClass="tooltip-custom-style"
          container="body"
          aria-hidden="true"
        >
          info
        </mat-icon>
      }
    } @else {
      <mat-spinner diameter="16" class="spinner-inline" color="primary"></mat-spinner>
      <span>Loading...</span>
    }
  </label>

  <mat-form-field
    class="field-stack__field"
    [class.mat-form-field-invalid]="hasError"
    [class.mat-form-field-touched]="isTouched"
  >
    <mat-select
      #inputField
      [value]="value"
      (selectionChange)="onChangeValue($event.value)"
      (openedChange)="onOpenedChange($event)"
      [required]="!isLoading && isRequired"
      [disabled]="disabled"
      [class.ng-invalid]="hasError"
      [class.ng-touched]="isTouched"
    >
      @if (isBlankOptionDisabled) {
        <mat-option [value]="0">
          {{ blankOptionText || 'Disabled' }}
        </mat-option>
      }

      @for (item of items; track item.id) {
        <mat-option [value]="item.id">
          {{ item.name }}
        </mat-option>
      }
    </mat-select>

    @if (hint) {
      <mat-hint>{{ hint }}</mat-hint>
    }
    @if (hasError && errors) {
      <mat-hint class="mat-mdc-form-field-error text-destructive">{{ title }} is required</mat-hint>
    }
  </mat-form-field>
</div>
