<div class="field-stack" [class.is-invalid]="hasError && isTouched && !readonly" [class.input--readonly]="readonly">
  <label class="field-stack__label" [attr.for]="inputId">
    @if (linkTo) {
      <a [routerLink]="linkTo">{{ title }}</a>
    } @else {
      {{ title }}
    }
    @if (isRequired && !readonly) {
      <span class="field-stack__required" aria-hidden="true">*</span>
    }
  </label>

  <div class="color-input-container">
    <mat-form-field
      class="field-stack__field"
      [class.mat-form-field-invalid]="hasError && !readonly"
      [class.mat-form-field-touched]="isTouched && !readonly"
    >
      <input
        #selectInput
        matInput
        [placeholder]="getDisplayColor()"
        type="color"
        [id]="inputId"
        [value]="getDisplayColor()"
        [class.ng-invalid]="hasError && !readonly"
        [class.ng-touched]="isTouched && !readonly"
        (input)="onValueChange($event)"
        (blur)="onTouched()"
        [style.background]="getDisplayColor()"
        [disabled]="disabled || readonly"
      />
      <span class="color-value">{{ getDisplayColor() }}</span>
      @if (randomColor && !readonly) {
        <button
          mat-icon-button
          matSuffix
          type="button"
          class="random-color-btn"
          matTooltip="Randomize Color"
          title="Randomize Color"
          (click)="generateRandomColor()"
          [disabled]="disabled"
        >
          <mat-icon>casino</mat-icon>
        </button>
      }
    </mat-form-field>
  </div>
</div>
