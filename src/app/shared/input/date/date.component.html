<div class="field-stack" [class.is-invalid]="hasError && isTouched">
  <label class="field-stack__label" [attr.for]="inputId">
    {{ title }}
    @if (isRequired) {
      <span class="field-stack__required" aria-hidden="true">*</span>
    }
  </label>

  <mat-form-field
    class="form-group field-stack__field"
    appearance="outline"
    [class.mat-form-field-invalid]="hasError"
    [class.mat-form-field-touched]="isTouched"
  >
    <input
      matInput
      [matDatepicker]="picker"
      [value]="value"
      [class.ng-invalid]="hasError"
      [class.ng-touched]="isTouched"
      (dateChange)="onDateChange($event)"
      (blur)="onTouched()"
      [required]="isRequired"
      [disabled]="disabled"
      [id]="inputId"
      #inputField
    />
    @if (hint) {
      <mat-hint>{{ hint }}</mat-hint>
    }
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>

    @if (hasError && errors) {
      <mat-hint class="mat-mdc-form-field-error text-destructive">
        @if (errors['required']) {
          <span>{{ title }} is required</span>
        }
        @if (errors['invalidDate']) {
          <span>Please enter a valid date</span>
        }
      </mat-hint>
    }
  </mat-form-field>
</div>
