<mat-dialog-content
  cdkDrag
  cdkDragRootElement=".cdk-overlay-pane"
  cdkDragHandle
  class="moveable-cursor break-all whitespace-pre-wrap"
>
  <h2 mat-dialog-title>Full Hash for: {{ data.hashlistName }}</h2>

  <h3>Full Hash</h3>
  <p>{{ data.unTruncatedText }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button-submit type="cancel-dialog" name="Close" (click)="closeDialog()"></button-submit>
</mat-dialog-actions>
