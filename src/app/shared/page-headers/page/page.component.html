<section class="flex flex-col gap-6 py-4">
  <header class="flex flex-col gap-2 m-0">
    <div class="flex items-center justify-between gap-3">
      <h1 class="page__title">{{ title }}</h1>
      @if (showAction && actionTitle) {
        <button matButton="filled" class="shrink-0" (click)="navigate()">
          <mat-icon>add</mat-icon>
          {{ actionTitle }}
        </button>
      }
    </div>
    @if (subtitle) {
      <p class="text-sm text-muted-foreground m-0">{{ subtitle }}</p>
    }
  </header>
  <div class="flex flex-col gap-6">
    <ng-content></ng-content>
  </div>
</section>
