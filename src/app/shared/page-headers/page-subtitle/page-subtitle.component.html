<div class="flex items-center justify-between gap-3 mb-3 mt-0">
  <h3 class="font-heading text-xl font-semibold text-heading-foreground m-0">{{ subtitle }}</h3>
  @if (actionTitle) {
    <button matButton="tonal" class="shrink-0" (click)="onAction()">
      @if (actionIcon) {
        <mat-icon>{{ actionIcon }}</mat-icon>
      }
      {{ actionTitle }}
    </button>
  }
</div>
