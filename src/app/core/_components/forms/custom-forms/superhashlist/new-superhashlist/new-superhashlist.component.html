<app-page title="Create Superhashlist">
  <grid-main [narrow]="true">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <input-text title="Name" formControlName="name" [isRequired]="true"></input-text>

      <input-multiselect
        [isLoading]="isLoading"
        [placeholder]="'Hashlists...'"
        [items]="selectHashlists"
        [label]="'Select or search Hashlists'"
        [mergeIdAndName]="true"
        formControlName="hashlistIds"
        [isRequired]="true"
      ></input-multiselect>

      <grid-buttons>
        <button-submit name="Cancel" [disabled]="false" type="cancel"></button-submit>
        <button-submit [name]="'Create'" [disabled]="false"></button-submit>
      </grid-buttons>
    </form>
  </grid-main>
</app-page>
