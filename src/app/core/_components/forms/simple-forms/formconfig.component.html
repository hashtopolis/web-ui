<app-page title="Settings">
  <horizontalnav [menuItems]="menuItems"></horizontalnav>
  @if (isloaded) {
    <app-dynamic-form
      [title]="title"
      [showPageWrapper]="false"
      [formMetadata]="formMetadata"
      [formValues]="formValues"
      [form]="form"
      [buttonText]="'Update'"
      [showDeleteButton]="false"
      [isServerAction]="isServerAction"
      (formSubmit)="onFormSubmit($event)"
    ></app-dynamic-form>
  }
</app-page>
