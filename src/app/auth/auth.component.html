<div class="login-container">
  <mat-card class="login-card">
    <div class="login-logo-container">
      <a routerLink="/"
        ><img
          [src]="isDarkMode ? headerConfig.brand.logored : headerConfig.brand.logo"
          [alt]="headerConfig.brand.name"
          [width]="90"
          [height]="90"
          alt="Hashtopolis"
      /></a>
    </div>
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <input-text
          class="card-login-field"
          title="Username"
          icon="account_circle"
          formControlName="username"
          [isRequired]="true"
        ></input-text>

        <input-text
          class="card-login-field"
          title="Password"
          icon="lock"
          formControlName="password"
          [isRequired]="true"
          [showPasswordToggle]="true"
          [passwordIsVisible]="!isVisible"
          (ShowPasswordEmit)="isVisible = !$event"
        ></input-text>

        <grid-buttons>
          <button-submit [name]="'Login'" [loading]="isLoading" data-testid="submit-button"></button-submit>
        </grid-buttons>

        <div class="forgot-password-link">
          <a routerLink="forgot">Forgot your password?</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <fixed-alert
    message="This is a private closed system. If you need access, you need to contact an admin."
  ></fixed-alert>
</div>
