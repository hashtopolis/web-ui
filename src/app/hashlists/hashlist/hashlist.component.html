<app-page
  [title]="pageTitle"
  actionTitle="New Hashlist"
  actionLink="/hashlists/new-hashlist"
  [showAction]="showCreateButton"
>
  <app-table>
    <app-hashlists-table #table name="hashlistsTable">
      <div class="table-action-wrapper" extra-actions>
        <mat-slide-toggle (change)="toggleIsArchived($event)">Show Archived</mat-slide-toggle>
      </div>
    </app-hashlists-table>
  </app-table>
</app-page>
