@if (uiSettings.uiConfig) {
  <app-header />
  <div
    [class.xsmall]="screen.isXSmall() | async"
    [class.small]="screen.isSmall() | async"
    [class.medium]="screen.isMedium() | async"
    [class.large]="screen.isLarge() | async"
    [class.xlarge]="screen.isXLarge() | async"
  >
    <main>
      <router-outlet />
    </main>
  </div>
}
<app-footer />
