<app-page [title]="'Access Group ' + editName">
  <grid-main [narrow]="true">
    <form [formGroup]="updateForm" (ngSubmit)="onSubmit()">
      <input-text title="Name" formControlName="groupName" [isRequired]="true"></input-text>

      <grid-buttons>
        <button-submit
          name="Delete"
          (click)="onDelete()"
          [disabled]="!roleService.hasRole('delete')"
          type="delete"
        ></button-submit>
        <button-submit
          [name]="'Update'"
          [disabled]="!roleService.hasRole('update')"
          [loading]="isUpdatingLoading"
        ></button-submit>
      </grid-buttons>
    </form>
  </grid-main>
  @if (editedAccessGroupIndex && roleService.hasRole('readUser')) {
    <app-table>
      <app-page-subtitle subtitle="User Members"></app-page-subtitle>
      <div class="mt-2 mb-3">
        <button-submit
          [name]="showAddUsersForm ? 'Close' : 'Add Users'"
          (click)="toggleAddUsersForm()"
          [disabled]="!roleService.hasRole('update')"
        ></button-submit>
      </div>

      @if (showAddUsersForm) {
        <form [formGroup]="addUsersForm" class="mb-3">
          @if (!isUsersLoading) {
            <div class="flex flex-col items-start">
              <input-multiselect
                [isLoading]="isUsersLoading"
                [placeholder]="'Users...'"
                [items]="selectUsers"
                [label]="'Select or search Users'"
                [mergeIdAndName]="true"
                formControlName="userIds"
                class="flex-1"
              >
              </input-multiselect>
              <div class="flex items-center mt-2.5">
                <button-submit
                  [name]="'Add'"
                  (click)="onAddUsers()"
                  [disabled]="!roleService.hasRole('update')"
                ></button-submit>
              </div>
            </div>
          } @else {
            <div class="loading-spinner">
              <mat-spinner diameter="32"></mat-spinner>
              <span>Loading Users...</span>
            </div>
          }
        </form>
      }

      <access-groups-users-table
        #userTable
        [accessgroupId]="editedAccessGroupIndex"
        (usersRemoved)="onUsersRemoved()"
      ></access-groups-users-table>
    </app-table>
  }
  @if (editedAccessGroupIndex && roleService.hasRole('readAgent')) {
    <app-table>
      <app-page-subtitle subtitle="Agent Members"></app-page-subtitle>
      <div class="mt-2 mb-3 flex items-center gap-2">
        <button-submit
          [name]="showAddAgentsForm ? 'Close' : 'Add Agents'"
          (click)="toggleAddAgentsForm()"
          [disabled]="!roleService.hasRole('update')"
        ></button-submit>
        <button mat-icon-button (click)="refresh()">
          <mat-icon>refresh</mat-icon>
        </button>
      </div>

      @if (showAddAgentsForm) {
        <form [formGroup]="addAgentsForm" class="mb-3">
          @if (!isAgentsLoading) {
            <div class="flex flex-col items-start">
              <input-multiselect
                [isLoading]="isAgentsLoading"
                [placeholder]="'Agents...'"
                [items]="selectAgents"
                [label]="'Select or search Agents'"
                [mergeIdAndName]="true"
                formControlName="agentIds"
                class="flex-1"
              >
              </input-multiselect>
              <div class="flex items-center mt-2.5">
                <button-submit
                  [name]="'Add'"
                  (click)="onAddAgents()"
                  [disabled]="!roleService.hasRole('update')"
                ></button-submit>
              </div>
            </div>
          } @else {
            <div class="loading-spinner">
              <mat-spinner diameter="32"></mat-spinner>
              <span>Loading Agents...</span>
            </div>
          }
        </form>
      }

      <app-access-groups-agents-table
        #agentTable
        [accessgroupId]="editedAccessGroupIndex"
        (agentsRemoved)="onAgentsRemoved()"
      ></app-access-groups-agents-table>
    </app-table>
  }
</app-page>
