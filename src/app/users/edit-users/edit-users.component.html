<app-page title="User Profile">
  <grid-main [narrow]="true">
    <form [formGroup]="updateForm" (ngSubmit)="onSubmit()">
      <app-form-row>
        <input-text title="ID" formControlName="id"></input-text>
        <input-text title="Name" formControlName="name"></input-text>
      </app-form-row>
      <app-form-row>
        <input-text title="Registered" formControlName="registered"></input-text>
        <input-text title="Last login" formControlName="lastLogin"></input-text>
      </app-form-row>
      <app-form-row>
        <input-text title="Email" formControlName="email"></input-text>
        <input-multiselect
          label="Member of access groups"
          [items]="selectUserAgps"
          [linkTo]="'/users/access-groups/'"
          [readonly]="true"
        ></input-multiselect>
      </app-form-row>

      <div formGroupName="updateData" class="flex flex-col gap-3">
        @if (permissionRoleService.hasRole('read')) {
          <input-select
            title="Global Permission Group"
            formControlName="globalPermissionGroupId"
            [items]="selectGlobalPermissionGroups"
          ></input-select>
        }

        <app-form-row>
          <div [formGroup]="updatePassForm">
            <input-text title="Password" formControlName="password" inputType="password"></input-text>
          </div>
          <input-check title="Active" formControlName="isValid"></input-check>
        </app-form-row>
      </div>

      <grid-buttons>
        <button-submit
          name="Delete"
          (click)="onDelete()"
          [disabled]="!userRoleService.hasRole('delete')"
          type="delete"
        ></button-submit>
        <button-submit
          [name]="'Update'"
          [disabled]="!userRoleService.hasRole('update')"
          [loading]="isUpdatingLoading"
        ></button-submit>
      </grid-buttons>
    </form>
  </grid-main>
</app-page>
