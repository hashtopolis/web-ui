<app-page title="Supertask Builder">
  <app-table xmlns="http://www.w3.org/1999/html">
    <horizontalnav [menuItems]="menuItems"></horizontalnav>
    <!-- Body -->
    <div class="grid grid-cols-12">
      <div class="col-span-12 md:col-span-6">
        <grid-main>
          <app-page-subtitle [subtitle]="'Wordlist/Rule Bulk'"></app-page-subtitle>
          <form [formGroup]="createForm" (ngSubmit)="onSubmit()">
            <input-text title="Name" formControlName="name" [isRequired]="true"></input-text>
            <app-form-row>
              <input-number title="Max Agents" formControlName="maxAgents"></input-number>
            </app-form-row>
            <app-form-row>
              <input-select
                title="Benchmark Type"
                formControlName="useNewBench"
                [items]="selectBenchmarktype"
              ></input-select>
              <input-select
                title="Binary type to run task"
                formControlName="crackerBinaryId"
                [items]="selectCrackertype"
              ></input-select>
            </app-form-row>
            <div class="flex flex-wrap items-center gap-6">
              <input-check title="Small Tasks" formControlName="isSmall"></input-check>
              <input-check title="CPU" formControlName="isCpuTask"></input-check>
            </div>
            <br />
            <input-text-area title="Base Command" formControlName="attackCmd" [isRequired]="true"></input-text-area>
            <blacklist-attack [value]="createForm.controls.attackCmd.value"></blacklist-attack>
            <fixed-alert
              message="IMPORTANT: You must include the 'FILE' placeholder in your Base Command. When you mark files as 'Iterate' in the panels on the right, the system will create a separate subtask for EACH selected file, replacing 'FILE' with the actual file path. This allows for sequential execution of different wordlists or rule files in your attack strategy."
            ></fixed-alert>
            <grid-buttons>
              <button-submit name="Cancel" [disabled]="false" type="cancel"></button-submit>
              <button-submit [name]="'Create'" [disabled]="false" [loading]="isLoading"></button-submit>
            </grid-buttons>
          </form>
        </grid-main>
      </div>
      <div class="col-span-12 md:col-span-6">
        <mat-accordion multi>
          <mat-expansion-panel>
            <mat-expansion-panel-header>
              <span><strong>Wordlists</strong></span>
            </mat-expansion-panel-header>
            <app-files-attack-table
              [fileType]="0"
              [bulkWordlistRule]="true"
              [formData]="getFormData()"
              (updateFormEvent)="onUpdateForm($event)"
              [cmdPrepro]="true"
              [customLabel]="customLabel"
            ></app-files-attack-table>
          </mat-expansion-panel>

          <mat-expansion-panel>
            <mat-expansion-panel-header>
              <span><strong>Rules</strong></span>
            </mat-expansion-panel-header>
            <app-files-attack-table
              [fileType]="1"
              [bulkWordlistRule]="true"
              [formData]="getFormData()"
              (updateFormEvent)="onUpdateForm($event)"
              [cmdPrepro]="true"
              [customLabel]="customLabel"
            ></app-files-attack-table>
          </mat-expansion-panel>

          <mat-expansion-panel>
            <mat-expansion-panel-header>
              <span><strong>Other</strong></span>
            </mat-expansion-panel-header>
            <app-files-attack-table
              [fileType]="2"
              [bulkWordlistRule]="true"
              [formData]="getFormData()"
              (updateFormEvent)="onUpdateForm($event)"
              [cmdPrepro]="true"
              [customLabel]="customLabel"
            ></app-files-attack-table>
          </mat-expansion-panel>
        </mat-accordion>
      </div>
    </div>
  </app-table>
</app-page>
