@if (!isLoading) {
  <grid-main>
    <app-page-title [title]="'Edit Preconfigured Tasks'" [subbutton]="false"></app-page-title>

    <form [formGroup]="updateForm" (ngSubmit)="onSubmit()">
      <input-text title="ID" formControlName="pretaskId"></input-text>

      <div formGroupName="updateData">
        <input-text title="Name" formControlName="taskName" [isRequired]="!isReadOnly"></input-text>
        <input-color title="Color" formControlName="color"></input-color>
        <input-text-area
          title="Attack command"
          formControlName="attackCmd"
          [isRequired]="!isReadOnly"
        ></input-text-area>
      </div>

      <div formGroupName="updateData" class="flex flex-wrap items-center gap-2">
        <input-number title="Priority" formControlName="priority"></input-number>
        <input-number title="Max agents" formControlName="maxAgents"></input-number>
        <input-number
          title="Measure is in seconds time."
          formControlName="chunkTime"
        ></input-number>
        <input-select
          title="The task will work only with CPU agents assigned"
          formControlName="isCpuTask"
          [items]="selectYesno"
        ></input-select>
        <input-select
          title="Small task"
          formControlName="isSmall"
          [items]="selectYesno"
        ></input-select>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <input-text title="Benchmark Type" formControlName="useNewBench"></input-text>
        <input-text title="Status timer" formControlName="statusTimer"></input-text>
      </div>

      @if (roleService.hasRole('edit')) {
        <grid-buttons>
          <button-submit [name]="'Update'"></button-submit>
          @if (isUpdatingLoading) {
            <div>
              <mat-spinner diameter="24" color="accent"></mat-spinner>
            </div>
          }
        </grid-buttons>
      }
    </form>

    <mat-accordion>
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>
            <span><b>Files</b></span>
          </mat-panel-title>
        </mat-expansion-panel-header>

        <app-files-table
          #table
          name="filesTableInPreTasks"
          [showExport]="false"
          [isSelectable]="false"
          [isFilterable]="true"
          [isSortable]="true"
          [isPageable]="false"
          [isDetailPage]="true"
          filterMode="client"
          [editIndex]="editedPretaskIndex"
          [editType]="1"
        ></app-files-table>
      </mat-expansion-panel>
    </mat-accordion>
  </grid-main>
}
